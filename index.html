<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wdth,wght,YTLC@0,6..12,75..125,200..1000,440..540;1,6..12,75..125,200..1000,440..540&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
      
        @theme {
            --font-nunito: "Nunito Sans", sans-serif;  
  --color-blue900: oklch(0.3362 0.0283 246.95);
  --color-blue950:oklch(0.2882 0.0252 243.46);
  --color-grey950:oklch(0.1942 0.0076 229.32);
  --color-grey400:oklch(0.5982 0 0);
  --color-grey50:oklch(0.9924 0 0);
  --font-weight-extrablack: 700; 
  
        }
      </style>


  </head>
  <body class="bg-grey50 font-nunito">

    <header class="flex bg-white w-full p-4 shadow-xl">
      <nav class="flex justify-between container mx-auto ">
        <div class=" font-nunito; text-xl font-[700]">Where in the world?</div>
        <div class="flex justify-between">
          <button class="inline-flex space-x-4 items-center">
            <svg data-toggle-icon="moon" class="w-5 h-5 mx-auto" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
              <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 21a9 9 0 0 1-.5-17.986V3c-.354.966-.5 1.911-.5 3a9 9 0 0 0 9 9c.239 0 .254.018.488 0A9.004 9.004 0 0 1 12 21Z"></path>
            </svg>
            <svg data-toggle-icon="sun" class="w-5 h-5 hidden" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
              <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5V3m0 18v-2M7.05 7.05 5.636 5.636m12.728 12.728L16.95 16.95M5 12H3m18 0h-2M7.05 16.95l-1.414 1.414M18.364 5.636 16.95 7.05M16 12a4 4 0 1 1-8 0 4 4 0 0 1 8 0Z"></path>
            </svg>
            <span class="hidden sm:block text-base font-[700] px-2">Dark mode</span>
          </button>
        </div>
      </nav>
      
    </header>

    <main class="container mx-auto p-4">
      <div class="flex flex-col md:flex-row md:justify-between">

        <div class="mb-[40px] md:w-1/2 md:mb-0">
          <form class="bg-white">   
            <label for="search" class="block mb-2.5 text-sm font-medium text-heading sr-only ">Search</label>
            <div class="relative">
                <div class="absolute inset-y-0 start-0 flex items-center ps-3 pointer-events-none">
                    <svg class="w-4 h-4 text-body text-grey400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"></path></svg>
                </div>
                <input type="search" id="search" class="text-grey400 block w-full p-3 ps-9 bg-neutral-secondary-medium border border-default-medium text-heading text-md rounded-base focus:ring-brand focus:border-brand shadow-xs placeholder:text-body" placeholder="Search for a country">
                
            </div>
        </form>
  
        </div>
        <div class="md:w-1/3 md:flex md:justify-end">
          <select class="bg-white shadow-xl py-4 px-4 block w-1/2 rounded-lg text-sm filterselect">
            <option selected="">Filter by Region</option>
           
          </select>
        </div>



      </div>
     
    </main>

    <section class="container mx-auto p-4">
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-10" id="card_item">
       



      </div>

     
    </section>

    <section class="container mx-auto pagination border-t border-gray-200 flex justify-between p-2">

      <div class="showpage hidden sm:flex items-center">
        <div>
          <p class="text-sm text-gray-700">
            Showing
            <span class="font-medium" id="start_page">1</span>
            to
            <span class="font-medium" id="end_page">10</span>
            of
            <span class="font-medium" id="totalpage_content">97</span>
            results
          </p>
        </div>

      </div>

      <div class="button_content flex flex-col items-center justify-center gap-1 sm:flex-row">
     <button class="bg-blue900 text-white p-2" onclick="prevpage()" id="prev">Previous</button>
     <div id="page_button" class="flex gap-2">
     
     </div>

     <button class="bg-blue900 text-white p-2" onclick="nextpage()" id="next">Next</button>

    </div>



    </section>







  

    



    
     <script src="js/custom.js"></script>
    
  </body>
  
</html>
